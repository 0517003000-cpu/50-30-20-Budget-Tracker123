<!DOCTYPE html>
<html>
<head>
<title>Monthly Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 contenteditable="true">Monthly Budget Tracker</h1>

<div class="topInfo">

<label>Name:</label>
<span contenteditable="true"></span>

<label>Monthly Income:</label>
<span contenteditable="true"></span>

</div>


<div class="monthManager">

<button onclick="newMonth()">+ New Month</button>

<div id="months"></div>

</div>


<div class="calculatorLink">

<a href="https://0517003000-cpu.github.io/Monthly-Budget-Calc/" target="_blank">
Open Budget Calculator
</a>

</div>


<div class="tables">


<!-- ESSENTIAL -->
<table class="budgetTable">

<tr>
<th colspan="2" contenteditable="true">Essential Expenses</th>
</tr>

<tr>
<td>Available Income</td>
<td contenteditable="true" id="essentialBudget"></td>
</tr>

<tr><td contenteditable="true"></td><td contenteditable="true" class="essential"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="essential"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="essential"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="essential"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="essential"></td></tr>

<tr>
<td>Total Spending</td>
<td id="essentialTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="essentialStatus">-</td>
</tr>

</table>



<!-- NON ESSENTIAL -->
<table class="budgetTable">

<tr>
<th colspan="2" contenteditable="true">Non Essential Expenses</th>
</tr>

<tr>
<td>Available Income</td>
<td contenteditable="true" id="nonBudget"></td>
</tr>

<tr><td contenteditable="true"></td><td contenteditable="true" class="non"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="non"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="non"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="non"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="non"></td></tr>

<tr>
<td>Total Spending</td>
<td id="nonTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="nonStatus">-</td>
</tr>

</table>



<!-- SAVINGS -->
<table class="budgetTable">

<tr>
<th colspan="2" contenteditable="true">Savings</th>
</tr>

<tr>
<td>Available Income</td>
<td contenteditable="true" id="saveBudget"></td>
</tr>

<tr><td contenteditable="true"></td><td contenteditable="true" class="save"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="save"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="save"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="save"></td></tr>
<tr><td contenteditable="true"></td><td contenteditable="true" class="save"></td></tr>

<tr>
<td>Total Spending</td>
<td id="saveTotal">0</td>
</tr>

<tr>
<td>Status</td>
<td id="saveStatus">-</td>
</tr>

</table>


</div>


<script src="script.js"></script>

</body>
</html>
